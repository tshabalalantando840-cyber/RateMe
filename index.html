<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RateMe - Rate and Review App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⭐ RateMe</h1>
            <p>Share your ratings and reviews</p>
        </header>

        <main>
            <section class="rating-form">
                <h2>Submit a Rating</h2>
                <form id="ratingForm">
                    <div class="form-group">
                        <label for="itemName">What are you rating?</label>
                        <input type="text" id="itemName" placeholder="e.g., Movie, Restaurant, Product..." required>
                    </div>

                    <div class="form-group">
                        <label for="rating">Rating (1-5 stars)</label>
                        <div class="star-rating">
                            <input type="radio" name="rating" value="5" id="star5">
                            <label for="star5">⭐</label>
                            <input type="radio" name="rating" value="4" id="star4">
                            <label for="star4">⭐</label>
                            <input type="radio" name="rating" value="3" id="star3">
                            <label for="star3">⭐</label>
                            <input type="radio" name="rating" value="2" id="star2">
                            <label for="star2">⭐</label>
                            <input type="radio" name="rating" value="1" id="star1">
                            <label for="star1">⭐</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="review">Your Review</label>
                        <textarea id="review" placeholder="Share your thoughts..." rows="4"></textarea>
                    </div>

                    <button type="submit" class="btn-submit">Submit Rating</button>
                </form>
            </section>

            <section class="ratings-display">
                <h2>Recent Ratings</h2>
                <div id="ratingsList" class="ratings-list">
                    <p class="empty-state">No ratings yet. Be the first to rate!</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 RateMe. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
